<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>theschneider.hair | Editorial Hair Artist Berlin</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theschneider.theme');
          if (stored === 'dark') {
            document.documentElement.classList.add('dark');
            return;
          }
          if (stored === 'light') {
            document.documentElement.classList.remove('dark');
            return;
          }
          var xhr = new XMLHttpRequest();
          xhr.open('GET', './data/settings.json', false);
          xhr.send(null);
          if (xhr.status === 200) {
            var j = JSON.parse(xhr.responseText);
            if (j && j.themeDefault === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>


  
    <div id="root"></div>




    <!-- Salonized Booking Widget -->
    <div
      id="salonized-widget"
      class="salonized-booking"
      data-company="m2yzkzSecfyaghBe93MNZGuc"
      data-color="#1b1c1c"
      data-language="en"
      data-position="right"
      data-outline="shadow"
    ></div>
    <script type="module" src="/src/main.tsx"></script>


  </body>
</html>
